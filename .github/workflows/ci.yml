name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  lint-test:
    name: luacheck + busted (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.4"
      - uses: leafo/gh-actions-luarocks@v6
      - name: Install tools
        run: |
          luarocks install luacheck
          luarocks install busted
      - name: Lint
        run: luacheck .
      - name: Test
        run: busted

  integration:
    name: headless neovim (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      # Best effort: install the elixir Treesitter parser so the parsing path is
      # exercised too. If it fails, the parser spec skips itself rather than the
      # whole job failing — the rest of the integration suite needs no parser.
      - name: Install elixir Treesitter parser
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/nvim-treesitter/nvim-treesitter \
            "$HOME/.local/share/nvim/site/pack/ts/start/nvim-treesitter"
          nvim --headless -u NONE -i NONE "+TSInstallSync! elixir" +qa
      - name: Integration tests
        run: nvim --headless -u NONE -i NONE -l test/run.lua
